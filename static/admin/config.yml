backend:
  name: git-gateway
  repo: chayev/chayev.com
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/d477ca8b-a29d-4fa9-a90c-667c40765a9a/pkce
  auth_token_endpoint: /sites/d477ca8b-a29d-4fa9-a90c-667c40765a9a/token
  gateway_url: https://gateway.decapbridge.com

  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg

site_url: https://chayev.github.io/chayev.com/

media_folder: "static/images"
public_folder: "/images"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Draft", name: "draft", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "pages"
    label: "Pages"
    files:
      - file: "content/_index.md"
        label: "Home Page"
        name: "home"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "string" }
          - { label: "Hero Hook", name: "hero_hook", widget: "text" }
          - { label: "Memoir Title", name: "memoir_title", widget: "string" }
          - { label: "Memoir Teaser Text", name: "memoir_teaser", widget: "markdown" }
          - { label: "Newsletter Hook", name: "newsletter_hook", widget: "string" }

      - file: "content/about/index.md"
        label: "About Page"
        name: "about"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Professional Summary Title", name: "professional_title", widget: "string" }
          - { label: "Professional Summary Content", name: "professional_summary", widget: "markdown" }
          - { label: "Personal Story Title", name: "personal_title", widget: "string" }
          - { label: "Personal Story Content", name: "personal_story", widget: "markdown" }

      - file: "content/memoir/index.md"
        label: "Memoir Page"
        name: "memoir"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Book Synopsis Title", name: "synopsis_title", widget: "string" }
          - { label: "Synopsis Content", name: "synopsis", widget: "markdown" }
          - { label: "Excerpt Title", name: "excerpt_title", widget: "string" }
          - { label: "Excerpt Content", name: "excerpt", widget: "markdown" }
          - { label: "Pre-order Hook", name: "preorder_hook", widget: "string" }
