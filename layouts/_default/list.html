{{ define "main" }}
<section class="blog-list-page">
  <header class="page-header">
    <h1 class="page-title">{{ .Title }}</h1>
  </header>
  
  <div class="blog-posts-container">
    {{ range .Pages }}
      <article class="blog-post-card">
        <header class="post-card-header">
          <h2 class="post-card-title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
          <div class="post-meta-container">
            <time class="post-date">{{ .Date.Format "January 2, 2006" }}</time>
            <span class="post-reading-time">{{ .ReadingTime }} min read</span>
          </div>
        </header>
        <p class="post-card-summary">{{ .Summary }}</p>
        <a href="{{ .RelPermalink }}" class="read-more-link">Read Essay &rarr;</a>
      </article>
    {{ else }}
      <p class="no-posts">No essays published yet. Check back soon!</p>
    {{ end }}
  </div>
</section>
{{ end }}
